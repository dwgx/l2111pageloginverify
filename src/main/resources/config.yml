initialized: true
enabled: true
encryption-enabled: true
admin-verify-enabled: false
require-online-mode: true
allow-chat-before-verify: false
# Whether to auto-open the verification book
auto-open-book: false
# Whether to hard-force keeping the book UI open
hard-force-open: false
# Allow temporary flight to avoid kicks before verification
allow-flight-while-unverified: true
# Show block title before verification
show-block-title: true
# Hide unverified players from others
hide-unverified: true
# Log pending item store/restore in console
log-pending: true
# Log login info (IP/salt) updates
log-login-info: true

