initialized: true
enabled: true
encryption-enabled: true
admin-verify-enabled: false
require-online-mode: true
allow-chat-before-verify: false
# Whether to auto-open the verification book
auto-open-book: false
# Whether to hard-force keeping the book UI open
hard-force-open: false
# Allow temporary flight to avoid kicks before verification
allow-flight-while-unverified: true
# Show block title before verification
show-block-title: true
# Block title timings (milliseconds)
title-fade-in-ms: 250
title-stay-ms: 8000
title-fade-out-ms: 500
# Hide unverified players from others
hide-unverified: true
# Log pending item store/restore in console
log-pending: true
# Log login info (IP/salt) updates
log-login-info: true

security:
  # Maximum lengths for account/password fields
  max-account-length: 32
  max-password-length: 64
  # Login attempt limits
  max-attempts: 5
  attempt-window-seconds: 60
  lock-seconds: 30
  # Kick if not verified within this time (0 to disable)
  verify-timeout-seconds: 60
  # Password hashing cost
  pbkdf2-iterations: 60000

web:
  enabled: true
  bind: "127.0.0.1"
  port: 1337
  local-only: true
  threads: 4
  max-body-bytes: 16384
  auth:
    enabled: true
    username: "admin"
    password: "change-me"
  text:
